services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanagement-postgres
    environment:
      POSTGRES_DB: taskmanagementdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - taskmanagement_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  taskmanagement_postgres_data:
